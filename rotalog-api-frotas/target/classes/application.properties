# RotaLog - API Frotas Configuration
# Legacy configuration with intentional debt

# Server
server.port=8080
server.servlet.context-path=/api

# Database - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/rotalog?currentSchema=frotas
spring.datasource.username=rotalog_admin
spring.datasource.password=rotalog123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=frotas

# Flyway
# Flyway - DESABILITADO: schema e seed gerenciados pelo docker-compose
# FIXME: deveria usar Flyway corretamente em vez de init scripts no docker
spring.flyway.enabled=false
#spring.flyway.locations=classpath:db/migration
#spring.flyway.schemas=frotas
#spring.flyway.baseline-on-migrate=true
#spring.flyway.baseline-version=2

# Logging
logging.level.root=INFO
logging.level.com.rotalog=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# URLs dos serviços externos
# rotalog.api.entregas.url=http://localhost:3000
rotalog.api.notificacoes.url=http://localhost:5000

# Manutenção preventiva — intervalos e agendamento
rotalog.manutencao.intervalo-km=10000
rotalog.manutencao.intervalo-meses=6
rotalog.manutencao.alerta.cron=0 0 6 * * *
rotalog.alerta.destinatario-gestor=gestor@rotalog.com

